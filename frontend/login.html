<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login | CASTLAB</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/styles.css">

</head>
<body class="login-page">

  <main style="display:flex;align-items:center;justify-content:center;min-height:100vh;">
  <form class="glass-card" onsubmit="login(event)" style="width:420px;padding:32px;">
    <h2 style="margin-bottom:24px;">Login</h2>

    <input id="email" type="email" placeholder="Email" required />
    <input id="password" type="password" placeholder="Password" required />

    <button type="submit">Login</button>

    <p style="margin-top:16px;">
      <a href="register.html">Create account</a>
    </p>
  </form>
</main>


  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
